<!DOCTYPE html>
<html>
<head>
	<title>sig-server2 console online</title>
</head>
<body style="background: #161620; color: #d1d1da; font: 1em monospace; padding: 10px;">
	<div id="output" style="display: block; border: 1px solid #d1d1da; box-shadow: inset 0px 0px 20px #000; color: inherit; font: inherit; outline: none; resize: none; background: inherit; width: 100%; height: calc(100vh - 84px); max-width: 800px; padding: 5px;"></div>
	<input id="input" style="display: block; border: 1px solid #d1d1da; box-shadow: inset 0px 0px 20px #000; color: inherit; font: inherit; outline: none; resize: none; padding: 5px; background: inherit; width: 100%; height: 24px; max-width: 800px; padding: 5px;">
	<script>
		output.value = ''; // browsers try to remember console history
		const put = l => {
			const span = document.createElement('div');
			output.value += l + '\n';
			output.scrollTop = output.scrollHeight;
		};
		put(`You need a key to access the sig-server2 console for ${location.hostname}.`);
		put(`If you're hosting a tournament or other event, ask yx for a key.`);
		put(`Then enter it in the box down at the bottom`);

		let ws = { readyState: 3 };

		const textDecoder = new TextDecoder();
		const history = [];
		input.addEventListener('keydown', ev => {
			if (ev.key !== 'Enter') return;
			if (ws.readyState === 0) return;

			const line = input.value.trim();
			history.push(line);
			input.value = '';

			if (ws.readyState === 2 || ws.readyState === 3) {
				const protocol = location.protocol === 'http:' ? 'ws:' : 'wss:';
				const address = `${protocol}//${location.hostname}:9119/?p=`;
				try {
					ws = new WebSocket(address + line);
				} catch (_) {
					put(`Can't connect to console because its address is invalid: ${address}`);
					put(`Tell yx about this?`);
					return;
				}
				ws.binaryType = 'arraybuffer';

				let timeout = setTimeout(() => {
					put('Can\'t reach the server, try again later?');
				}, 3000);

				let opened = false;
				ws.addEventListener('close', () => {
					clearTimeout(timeout);
					if (opened) put(`Disconnected. Enter your key to reconnect.`);
					else put(`Incorrect key, try again:`);
				});
				ws.addEventListener('message', m => {
					output.value += textDecoder.decode(m.data);
					output.scrollTop = output.scrollHeight; 
				});
				ws.addEventListener('open', () => {
					clearTimeout(timeout);
					opened = true;
					put(`Connection opened! Type 'help' for a list of commands.`);
				});
			} else if (ws.readyState === 1) {
				put('> ' + line);
				ws.send(line);
			}
		});
	</script>
</body>
</html>
